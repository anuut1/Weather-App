<!DOCTYPE html>
<html>
<head>
    <title>JSON Slider</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        #slider {
            width: 600px;
            height: 300px;
            margin: 50px auto;
            position: relative;
            overflow: hidden;
            color: white;
        }

        .slide {
            width: 100%;
            height: 100%;
            display: none;
            text-align: center;
            padding-top: 100px;
            font-size: 24px;
        }

        .active {
            display: block;
        }

        button {
            position: absolute;
            bottom: 20px;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
        }

        .prev {
            left: 20px;
        }

        .next {
            right: 20px;
        }
    </style>
</head>
<body>

<div id="slider"></div>

<script src="question5.js"></script>

</body>
</html>
