<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather App</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">


</head>
<body>
  <header>
    <h1>Weather</h1>
    <p>Real-time weather at your fingertips</p>
  </header>

  <div class="search-wrap">
    <button class="btn geo" id="geoBtn" title="Use my location">📍</button>
    <input type="text" id="searchInput" placeholder="Search city…" />
    <button class="btn" id="searchBtn">Search</button>
  </div>

  <p class="error-msg" id="errorMsg"></p>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    Fetching weather…
  </div>

  <div class="card" id="weatherCard">

    <div class="hero">
      <button class="unit-btn" id="unitBtn">Switch to °F</button>
      <div class="hero-left">
        <div class="city-name" id="cityName">—</div>
        <div class="country" id="countryName"></div>
        <div class="temp-big" id="tempBig">—</div>
        <div class="feels" id="feelsLike"></div>
        <div class="description" id="description"></div>
      </div>
      <div class="hero-right">
        <img class="weather-icon" id="weatherIcon" src="" alt="weather icon"/>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="icon">💧</div><div class="label">Humidity</div><div class="value" id="humidity">—</div></div>
      <div class="stat"><div class="icon">🌬</div><div class="label">Wind</div><div class="value" id="wind">—</div></div>
      <div class="stat"><div class="icon">👁</div><div class="label">Visibility</div><div class="value" id="visibility">—</div></div>
      <div class="stat"><div class="icon">📊</div><div class="label">Pressure</div><div class="value" id="pressure">—</div></div>
    </div>

    <!-- Sunrise / Sunset -->
    <div class="sun-section">
      <h3>☀️ Sunrise &amp; Sunset</h3>
      <div class="sun-arc">
        <svg viewBox="0 0 400 50" preserveAspectRatio="none">
          <path d="M 20 45 Q 200 -20 380 45" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2" stroke-dasharray="5 5"/>
          <path id="arcTraveled" d="M 20 45 Q 200 -20 380 45" fill="none" stroke="url(#sunGrad)" stroke-width="2.5"
            stroke-dasharray="1000" stroke-dashoffset="1000" style="transition: stroke-dashoffset 1s ease"/>
          <defs>
            <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#f0883e"/>
              <stop offset="100%" stop-color="#f7c94b"/>
            </linearGradient>
          </defs>
          <circle id="sunDot" cx="20" cy="45" r="6" fill="#f7c94b" style="filter:drop-shadow(0 0 6px #f0883e); transition: cx 1s ease, cy 1s ease"/>
        </svg>
      </div>
      <div class="sun-times">
        <span class="rise">🌅 <strong id="sunriseTime">—</strong></span>
        <span style="color:var(--muted);font-size:0.78rem" id="dayLength"></span>
        <span class="set">🌇 <strong id="sunsetTime">—</strong></span>
      </div>
    </div>

    <!-- AQI -->
    <div class="aqi-section">
      <h3>🌿 Air Quality Index</h3>
      <div class="aqi-row">
        <div class="aqi-badge" id="aqiBadge">
          <span class="aqi-num" id="aqiNum">—</span>
          <span class="aqi-idx">AQI</span>
        </div>
        <div class="aqi-info">
          <div class="aqi-label" id="aqiLabel">—</div>
          <div class="aqi-desc"  id="aqiDesc">—</div>
        </div>
      </div>
      <div class="aqi-bar-wrap">
        <div class="aqi-bar-fill"></div>
        <div class="aqi-bar-marker" id="aqiMarker"></div>
      </div>
      <div class="aqi-pollutants" id="aqiPollutants"></div>
    </div>

    <!-- 5-Day Forecast -->
    <div class="forecast-section">
      <h3>📅 5-Day Forecast</h3>
      <div class="forecast-grid" id="forecastGrid"></div>
    </div>

  </div>

  <script src="weather.js"></script>
</body>
</html>
