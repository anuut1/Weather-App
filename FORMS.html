<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form in html</title>
    <style>
        .container{
            border:1px solid black;
            display:inline-block;
        }
        table,th,td{
            border:1px solid black;
            border-collapse: collapse;
            padding:7px;
        }
    </style>
</head>

<body>
    <form>
        <div class="container">
            <table>
                <tr>
                    <td colspan="2" align="center">
                        Sign In 
                    </td>
                </tr>

                <tr>
                    <th>
                        E-mail address 
                    </th>
                    <td>
                        <input type="text">
                        
                    </td>
                    
                </tr>
                <tr>
                    <th>
                        Password 
                    </th>
                    <td>
                        <input type="password">
                    </td>
                </tr>
                <tr>
                    <td colspan="2" align="center">
                        <button>Sign In</button>
                    </td>
                </tr>
            </table>
        </div>

    </form>
</body>

</html>
