    <style>
        .Search-bar {
            display: block;
            margin-bottom: 10px;
        }

        .thumbnail {

            width: 300px;
            height: 200px;
            object-fit: cover;
            padding-left: 15px;
            margin-bottom: 0px;
            margin-right: 5px;
            display: block;
            



        }

        .video-title {
            width: 278px;
            padding-left: 15px;
            font-family: Arial, Helvetica, sans-serif;
            margin-top:10px;
        }

        .video-author {
            color: rgb(104, 102, 102);
            padding-left: 20px;
            margin-bottom: 0px;
        }

        .video-stats {
            color: rgb(104, 102, 102);
            padding-left: 20px;
            margin-top: 4px;
        }

        .video-preview {
            width: 300px;
            display: inline-block;
            margin-left: 10px;
            vertical-align: top;
            cursor: pointer;
        }

        .profile-picture {
            display: inline-block;
            vertical-align:top;
            width:50px;
        }

        .video-info {
            display: inline-block;
            width:200px;

        }
        .channel-picture{
            width:40px;
            border-radius:50px;
            margin-left:20px;
            margin-top:10px;
        }
    </style>

</head>

<body>

    <!-- <img class="thumbnail" src="https://cdn.omlet.com/images/cache/850/567/breed_abyssinian_cat.webp">

        <div>
            <div class="profile-picture">

            </div>
            <div class="video-info">
                <p class="video-title">
                    <strong>Talking Tech and AI with Google CEO Sundar Pichai!</strong>
                </p>
                <p class="video-author">
                    Marques browniee
                </p>
                <p class="video-stats">

                </p>
            </div>
        </div>
    </div>
    <div class="video-preview">

        </p>

    </div>
